<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sudoku SAT</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        .hidden { display: none !important; }
        #board { display: grid; gap: 2px; background: #333; border: 4px solid #333; margin: 20px 0; }
        .cell { width: 50px; height: 50px; background: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .cell.selected { background: #e0f0ff; outline: 2px solid #007bff; }
        .cell.given { font-weight: bold; color: #000; background: #f8f8f8; }
        .cell.user { color: #007bff; }
        .cell.error { background: #ff7675; color: white; }
        .cell-edge-r { border-right: 3px solid #333; }
        .cell-edge-b { border-bottom: 3px solid #333; }
        #numberPad { display: grid; gap: 10px; margin-top: 10px; }
        .num-btn { padding: 15px; border: none; background: #007bff; color: white; border-radius: 8px; cursor: pointer; font-size: 18px; }
        #winOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="levelScreen">
        <h1>Select Sudoku Level</h1>
        <button class="level-btn" data-level="easy">Easy 4x4</button>
        <button class="level-btn" data-level="medium">Medium 6x6</button>
        <button class="level-btn" data-level="hard">Hard 9x9</button>
    </div>

    <div id="gameScreen" class="hidden">
        <div>Level: <span id="levelBadge"></span> | Time: <span id="timer">0:00</span></div>
        <div id="board"></div>
        <div id="numberPad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn" data-num="0">Clear</button>
        </div>
        <button id="changeLevelBtn">Back</button>
        <button id="newGameBtn">Restart</button>
    </div>

    <div id="winOverlay" class="hidden">
        <h1>You Win!</h1>
        <p id="winTime"></p>
        <button id="playAgainBtn">Play Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
